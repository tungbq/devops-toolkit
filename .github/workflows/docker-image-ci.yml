name: Docker Image CI

on:
  pull_request:
    branches: ['main']
    paths:
      - 'Dockerfile'
      - 'scripts/*'
      - '.github/workflows/docker-image-ci.yml'
      - 'samples/'

# Abort the previous running CI workflow in the same pull request
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Build the Docker image
        run: |
          SHA7=${GITHUB_SHA::7}
          echo $SHA7
          docker build . --file Dockerfile --tag "devops-toolkit-review:$GITHUB_SHA"

      - name: Verify tool versions
        run: |
          cd scripts
          chmod +x check_version_in_toolkit.sh
          ./check_version_in_toolkit.sh "devops-toolkit-review:$GITHUB_SHA" "../toolkit_info.json"

      - name: Running Sample Tool Code
        run: |
          echo "Run sample tool code inside toolkit"
          docker run --rm devops-toolkit-review:$GITHUB_SHA samples/run_sample.sh

      - name: Scan image with Trivy (SARIF for PR annotations)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'devops-toolkit-review:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy results to the Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Fail PR on fixable CRITICAL/HIGH vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'devops-toolkit-review:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
